name: Build CTHD for Windows and macOS

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.22'
      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest
      - name: Build Main Application
        run: |
          fyne package -os windows -name "CTHD" -src .
        shell: bash
      - name: Build Manager Application
        run: |
          cd manager
          fyne package -os windows -name "CTHD_Manager" -src .
          mv "CTHD_Manager.exe" "../"
        shell: bash
      - name: Package Windows ZIP
        run: |
          # The apps are already CTHD.exe and CTHD_Manager.exe in the root
          powershell -Command "Compress-Archive -Path 'CTHD.exe', 'CTHD_Manager.exe', 'manual.html', 'README.md' -DestinationPath 'CTHD_Windows.zip'"
        shell: bash
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CTHD-Binaries-Windows
          path: CTHD_Windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.22'
      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest
      - name: Build CTHD (Universal)
        run: |
          # Build amd64
          GOARCH=amd64 fyne package -os darwin -name "CTHD_amd64" -src .
          # Build arm64 (default on macos-14)
          GOARCH=arm64 fyne package -os darwin -name "CTHD_arm64" -src .
          # Create Universal binary
          mkdir -p "CTHD.app/Contents/MacOS"
          lipo -create -output "CTHD.app/Contents/MacOS/CTHD" "CTHD_amd64.app/Contents/MacOS/CTHD_amd64" "CTHD_arm64.app/Contents/MacOS/CTHD_arm64"
          # Copy resources from one of the packages (arm64)
          cp -R "CTHD_arm64.app/Contents/Resources" "CTHD.app/Contents/"
          cp "CTHD_arm64.app/Contents/Info.plist" "CTHD.app/Contents/"
          cp "CTHD_arm64.app/Contents/PkgInfo" "CTHD.app/Contents/"
          rm -rf CTHD_amd64.app CTHD_arm64.app
        shell: bash
      - name: Build Manager Application (Universal)
        run: |
          cd manager
          # Build amd64
          GOARCH=amd64 fyne package -os darwin -name "CTHD_Manager_amd64" -src .
          # Build arm64
          GOARCH=arm64 fyne package -os darwin -name "CTHD_Manager_arm64" -src .
          # Create Universal binary
          mkdir -p "CTHD_Manager.app/Contents/MacOS"
          lipo -create -output "CTHD_Manager.app/Contents/MacOS/CTHD_Manager" "CTHD_Manager_amd64.app/Contents/MacOS/CTHD_Manager_amd64" "CTHD_Manager_arm64.app/Contents/MacOS/CTHD_Manager_arm64"
          # Copy resources
          cp -R "CTHD_Manager_arm64.app/Contents/Resources" "CTHD_Manager.app/Contents/"
          cp "CTHD_Manager_arm64.app/Contents/Info.plist" "CTHD_Manager.app/Contents/"
          cp "CTHD_Manager_arm64.app/Contents/PkgInfo" "CTHD_Manager.app/Contents/"
          rm -rf CTHD_Manager_amd64.app CTHD_Manager_arm64.app
          mv "CTHD_Manager.app" "../"
        shell: bash
      - name: Package macOS ZIP & DMG
        run: |
          # ZIP as requested by user
          zip -r CTHD_macOS.zip "CTHD.app" "CTHD_Manager.app" manual.html README.md
          
          # Maintain DMG for convenience
          mkdir -p dmg_root
          cp -R "CTHD.app" dmg_root/
          cp -R "CTHD_Manager.app" dmg_root/
          cp "manual.html" dmg_root/
          cp "README.md" dmg_root/
          hdiutil create -volname "CTHD Universal" -srcfolder dmg_root -ov -format UDZO "CTHD_macOS.dmg"
        shell: bash
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CTHD-Binaries-macOS
          path: |
            CTHD_macOS.zip
            CTHD_macOS.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.22'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxext-dev libxfixes-dev
      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest
      - name: Build Main Application
        run: |
          fyne package -os linux -name "CTHD" -src .
          # fyne package produces CTHD.tar.xz
          tar -xvf CTHD.tar.xz
          mv usr/local/bin/CTHD ./
          rm -rf usr
        shell: bash
      - name: Build Manager Application
        run: |
          cd manager
          fyne package -os linux -name "CTHD_Manager" -src .
          # produces CTHD_Manager.tar.xz
          tar -xvf CTHD_Manager.tar.xz
          mv usr/local/bin/CTHD_Manager ../
          cd ..
          rm -rf manager/usr
        shell: bash
      - name: Package Linux ZIP
        run: |
          zip -r CTHD_Linux.zip CTHD CTHD_Manager manual.html README.md
        shell: bash
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CTHD-Binaries-Linux
          path: CTHD_Linux.zip

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/CTHD_Windows.zip
            artifacts/CTHD_macOS.zip
            artifacts/CTHD_macOS.dmg
            artifacts/CTHD_Linux.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
