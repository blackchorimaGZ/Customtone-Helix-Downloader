name: Build CTHD for Windows and macOS

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.22'
      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest
      - name: Build Main Application
        run: |
          fyne package -os windows -name "CTHD" -src .
          mv "CTHD.exe" "CTHD_Windows.exe"
        shell: bash
      - name: Build Manager Application
        run: |
          cd manager
          fyne package -os windows -name "CTHD_Manager" -src .
          mv "CTHD_Manager.exe" "../CTHD_Manager_Windows.exe"
        shell: bash
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CTHD-Binaries-Windows
          path: |
            CTHD_Windows.exe
            CTHD_Manager_Windows.exe
            manual.html

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.22'
      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest
      - name: Build Main Application
        run: |
          fyne package -os darwin -name "CTHD" -src .
          mkdir -p dmg_root
          cp -R "CTHD.app" dmg_root/
          cp "manual.html" dmg_root/
          hdiutil create -volname "CustomTone Helix Downloader" -srcfolder dmg_root -ov -format UDZO "CTHD_macOS.dmg"
        shell: bash
      - name: Build Manager Application
        run: |
          cd manager
          fyne package -os darwin -name "CTHD_Manager" -src .
          mkdir -p dmg_root
          cp -R "CTHD_Manager.app" dmg_root/
          cp "../manual.html" dmg_root/
          hdiutil create -volname "Helix Manager" -srcfolder dmg_root -ov -format UDZO "CTHD_Manager_macOS.dmg"
          mv "CTHD_Manager_macOS.dmg" ../
        shell: bash
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CTHD-Binaries-macOS
          path: |
            CTHD_macOS.dmg
            CTHD_Manager_macOS.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.22'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxext-dev libxfixes-dev
      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest
      - name: Build Main Application
        run: |
          fyne package -os linux -name "CTHD" -src .
          # The binary is named 'CTHD'
          mkdir -p dist_linux
          mv CTHD dist_linux/
          cp manual.html dist_linux/
          tar -czvf "CTHD_Linux.tar.gz" -C dist_linux .
        shell: bash
      - name: Build Manager Application
        run: |
          cd manager
          fyne package -os linux -name "CTHD_Manager" -src .
          # The binary is named 'CTHD_Manager'
          mkdir -p dist_linux
          mv CTHD_Manager dist_linux/
          cp ../manual.html dist_linux/
          tar -czvf "../CTHD_Manager_Linux.tar.gz" -C dist_linux .
        shell: bash
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CTHD-Binaries-Linux
          path: |
            CTHD_Linux.tar.gz
            CTHD_Manager_Linux.tar.gz

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/CTHD_Windows.exe
            artifacts/CTHD_Manager_Windows.exe
            artifacts/CTHD_macOS.dmg
            artifacts/CTHD_Manager_macOS.dmg
            artifacts/CTHD_Linux.tar.gz
            artifacts/CTHD_Manager_Linux.tar.gz
            artifacts/manual.html
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
