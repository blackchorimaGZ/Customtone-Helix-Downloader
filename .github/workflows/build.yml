name: Build CTHD for Windows and macOS

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.22'

      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Build Main Application
        run: |
          fyne package -os ${{ matrix.os == 'macos-latest' && 'darwin' || 'windows' }} -src .
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            find . -maxdepth 1 -name "*.app" -exec zip -r "{}.zip" "{}" \;
          fi
        shell: bash

      - name: Build Manager Application
        run: |
          cd manager
          fyne package -os ${{ matrix.os == 'macos-latest' && 'darwin' || 'windows' }} -src .
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            find . -maxdepth 1 -name "*.app" -exec zip -r "{}.zip" "{}" \;
          fi
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CTHD-Binaries-${{ matrix.os }}
          path: |
            *.exe
            *.app.zip
            manager/*.exe
            manager/*.app.zip
            manual.html

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            *.exe
            *.app.zip
            manager/*.exe
            manager/*.app.zip
            manual.html
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
