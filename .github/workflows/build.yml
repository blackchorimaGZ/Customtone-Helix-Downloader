name: Build CTHD for Windows and macOS

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.22'

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxext-dev libxfixes-dev

      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Build Main Application
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            fyne package -os darwin -src .
            mkdir -p dmg_root
            cp -R "CustomTone Helix Downloader.app" dmg_root/
            hdiutil create -volname "CustomTone Helix Downloader" -srcfolder dmg_root -ov -format UDZO "CTHD_macOS.dmg"
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            fyne package -os linux -src .
            tar -czvf "CTHD_Linux.tar.gz" "CustomTone Helix Downloader"
          else
            fyne package -os windows -src .
            mv "CustomTone Helix Downloader.exe" "CTHD_Windows.exe"
          fi
        shell: bash

      - name: Build Manager Application
        run: |
          cd manager
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            fyne package -os darwin -src .
            mkdir -p dmg_root
            cp -R "Helix Manager.app" dmg_root/
            hdiutil create -volname "Helix Manager" -srcfolder dmg_root -ov -format UDZO "CTHD_Manager_macOS.dmg"
            mv "CTHD_Manager_macOS.dmg" ../
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            fyne package -os linux -src .
            tar -czvf "../CTHD_Manager_Linux.tar.gz" "Helix Manager"
          else
            fyne package -os windows -src .
            mv "Helix Manager.exe" "../CTHD_Manager_Windows.exe"
          fi
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CTHD-Binaries-${{ matrix.os }}
          path: |
            CTHD_Windows.exe
            CTHD_Manager_Windows.exe
            CTHD_macOS.dmg
            CTHD_Manager_macOS.dmg
            CTHD_Linux.tar.gz
            CTHD_Manager_Linux.tar.gz
            manual.html

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            CTHD_Windows.exe
            CTHD_Manager_Windows.exe
            CTHD_macOS.dmg
            CTHD_Manager_macOS.dmg
            CTHD_Linux.tar.gz
            CTHD_Manager_Linux.tar.gz
            manual.html
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
