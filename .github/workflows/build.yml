name: Build CTHD for Windows and macOS

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.22'
      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest
      - name: Build Main Application
        run: |
          fyne package -os windows -name "CTHD" -src .
        shell: bash
      - name: Build Manager Application
        run: |
          cd manager
          fyne package -os windows -name "CTHD_Manager" -src .
          mv "CTHD_Manager.exe" "../"
        shell: bash
      - name: Package Windows ZIP
        run: |
          powershell -Command "Compress-Archive -Path 'CTHD.exe', 'CTHD_Manager.exe', 'manual.html', 'README.md' -DestinationPath 'CTHD_Windows.zip'"
        shell: bash
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CTHD-Binaries-Windows
          path: CTHD_Windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.22'
      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest
      - name: Build CTHD (Universal)
        run: |
          # Build Bundles
          GOARCH=amd64 fyne package -os darwin -name "CTHD_amd64" -src .
          GOARCH=arm64 fyne package -os darwin -name "CTHD_arm64" -src .
          
          # Create final bundle from arm64 template
          cp -R "CTHD_arm64.app" "CTHD.app"
          
          # Find binaries inside (they might be CTHD_amd64/arm64 or descargadorhelix)
          BIN_AMD64=$(find CTHD_amd64.app/Contents/MacOS -type f -maxdepth 1 | head -n 1)
          BIN_ARM64=$(find CTHD_arm64.app/Contents/MacOS -type f -maxdepth 1 | head -n 1)
          
          # Merge
          lipo -create -output "CTHD.app/Contents/MacOS/CTHD" "$BIN_AMD64" "$BIN_ARM64"
          
          # Fix Info.plist Executable Name
          OLD_EXEC=$(grep -A1 "CFBundleExecutable" "CTHD.app/Contents/Info.plist" | grep "string" | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
          sed -i '' "s/$OLD_EXEC/CTHD/g" "CTHD.app/Contents/Info.plist"
          
          rm -rf CTHD_amd64.app CTHD_arm64.app
        shell: bash
      - name: Build Manager Application (Universal)
        run: |
          cd manager
          # Build Bundles
          GOARCH=amd64 fyne package -os darwin -name "CTHD_Manager_amd64" -src .
          GOARCH=arm64 fyne package -os darwin -name "CTHD_Manager_arm64" -src .
          
          # Create final bundle from arm64 template
          cp -R "CTHD_Manager_arm64.app" "CTHD_Manager.app"
          
          # Find binaries inside
          BIN_AMD64=$(find CTHD_Manager_amd64.app/Contents/MacOS -type f -maxdepth 1 | head -n 1)
          BIN_ARM64=$(find CTHD_Manager_arm64.app/Contents/MacOS -type f -maxdepth 1 | head -n 1)
          
          # Merge
          lipo -create -output "CTHD_Manager.app/Contents/MacOS/CTHD_Manager" "$BIN_AMD64" "$BIN_ARM64"
          
          # Fix Info.plist Executable Name
          OLD_EXEC=$(grep -A1 "CFBundleExecutable" "CTHD_Manager.app/Contents/Info.plist" | grep "string" | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
          sed -i '' "s/$OLD_EXEC/CTHD_Manager/g" "CTHD_Manager.app/Contents/Info.plist"
          
          rm -rf CTHD_Manager_amd64.app CTHD_Manager_arm64.app
          mv "CTHD_Manager.app" "../"
        shell: bash
      - name: Package macOS ZIP & DMG
        run: |
          zip -r CTHD_macOS.zip "CTHD.app" "CTHD_Manager.app" manual.html README.md
          mkdir -p dmg_root
          cp -R "CTHD.app" dmg_root/
          cp -R "CTHD_Manager.app" dmg_root/
          cp "manual.html" dmg_root/
          cp "README.md" dmg_root/
          hdiutil create -volname "CTHD Universal" -srcfolder dmg_root -ov -format UDZO "CTHD_macOS.dmg"
        shell: bash
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CTHD-Binaries-macOS
          path: |
            CTHD_macOS.zip
            CTHD_macOS.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.22'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxext-dev libxfixes-dev
      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest
      - name: Build Main Application
        run: |
          fyne package -os linux -name "CTHD" -src .
          # Find any .tar.xz and extract it
          ls *.tar.xz | xargs -n 1 tar -xvf
          # Find the actual binary (it might be named CTHD or descargadorhelix)
          find . -type f -executable -not -name "*.sh" -not -name "*.xz" -not -name "CTHD" -exec mv {} ./CTHD \;
          rm -rf usr descargadorhelix
        shell: bash
      - name: Build Manager Application
        run: |
          cd manager
          fyne package -os linux -name "CTHD_Manager" -src .
          ls *.tar.xz | xargs -n 1 tar -xvf
          find . -type f -executable -not -name "*.sh" -not -name "*.xz" -not -name "CTHD_Manager" -exec mv {} ../CTHD_Manager \;
          cd ..
          rm -rf manager/usr manager/descargadorhelix
        shell: bash
      - name: Package Linux ZIP
        run: |
          zip -r CTHD_Linux.zip CTHD CTHD_Manager manual.html README.md
        shell: bash
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CTHD-Binaries-Linux
          path: CTHD_Linux.zip

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/CTHD_Windows.zip
            artifacts/CTHD_macOS.zip
            artifacts/CTHD_macOS.dmg
            artifacts/CTHD_Linux.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
